<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGFEJ - Configurações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .gradient-bg {
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      }
      .sidebar-link:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      .section-card {
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      }
      .section-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.2);
      }
      
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden">
    <div class="flex">
      <!-- Sidebar (desktop) -->
      <aside class="hidden md:block fixed inset-y-0 left-0 w-64 z-40">
        <div
          class="h-screen overflow-y-auto flex flex-col gradient-bg text-white w-64"
        >
          <div
            class="flex items-center justify-center h-16 px-4 border-b border-blue-800"
          >
            <div class="flex items-center">
              <i data-feather="layers" class="w-8 h-8 text-blue-200"></i>
              <span class="ml-2 text-xl font-semibold">IGFEJ</span>
            </div>
          </div>
          <div class="flex flex-col flex-grow px-4 py-4 overflow-y-auto">
            <nav class="flex-1 space-y-2">
              <a
                href="index.html"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
              >
                <i data-feather="home" class="w-5 h-5 mr-3"></i> Dashboard
              </a>
              <a
                href="processos.html"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
              >
                <i data-feather="file-text" class="w-5 h-5 mr-3"></i> Processos
              </a>
              <a
                href="teams.html"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
              >
                <i data-feather="users" class="w-5 h-5 mr-3"></i> Equipas
              </a>
              <a
                href="relatorios.html"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
              >
                <i data-feather="bar-chart-2" class="w-5 h-5 mr-3"></i>
                Relatórios
              </a>
              <a
                href="configuracoes.html"
                class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-white bg-blue-800"
              >
                <i data-feather="settings" class="w-5 h-5 mr-3"></i>
                Configurações
              </a>
            </nav>
            <div class="mt-auto mb-4">
              <div class="p-4 bg-blue-800 rounded-lg">
                <h4 class="text-sm font-medium text-white">
                  Ajuda &amp; Suporte
                </h4>
                <p class="mt-1 text-xs text-blue-200">
                  Contacte a nossa equipa para qualquer questão.
                </p>
                <button
                  class="mt-2 w-full px-3 py-2 text-xs font-medium text-center text-blue-900 bg-white rounded-md"
                >
                  Contactar Suporte
                </button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Mobile drawer -->
      <div id="mobileDrawer" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40" id="drawerBackdrop"></div>
        <aside
          class="absolute left-0 top-0 h-full w-72 gradient-bg text-white shadow-xl"
        >
          <div
            class="flex items-center justify-between h-16 px-4 border-b border-blue-800"
          >
            <div class="flex items-center">
              <i data-feather="scale" class="w-7 h-7 text-blue-200"></i>
              <span class="ml-2 text-lg font-semibold">IGFEJ</span>
            </div>
            <button
              id="closeDrawer"
              class="p-2 rounded hover:bg-white/10"
              aria-label="Fechar menu"
            >
              <i data-feather="x" class="w-5 h-5"></i>
            </button>
          </div>
          <nav class="p-4 space-y-2">
            <a
              href="index.html"
              class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
            >
              <i data-feather="home" class="w-5 h-5 mr-3"></i> Dashboard
            </a>
            <a
              href="processos.html"
              class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
            >
              <i data-feather="file-text" class="w-5 h-5 mr-3"></i> Processos
            </a>
            <a
              href="teams.html"
              class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
            >
              <i data-feather="users" class="w-5 h-5 mr-3"></i> Equipas
            </a>
            <a
              href="relatorios.html"
              class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-blue-100"
            >
              <i data-feather="bar-chart-2" class="w-5 h-5 mr-3"></i> Relatórios
            </a>
            <a
              href="configuracoes.html"
              class="flex items-center px-4 py-3 text-sm font-medium rounded-lg sidebar-link text-white bg-blue-800"
            >
              <i data-feather="settings" class="w-5 h-5 mr-3"></i> Configurações
            </a>
          </nav>
        </aside>
      </div>

      <!-- Main content -->
      <div class="flex flex-col flex-1 overflow-hidden md:ml-64">
        <!-- Top bar -->
        <header
          class="sticky top-0 z-20 flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200"
        >
          <div class="flex items-center">
            <button
              id="openDrawer"
              class="md:hidden mr-4 p-2 rounded hover:bg-gray-100"
              aria-label="Abrir menu"
            >
              <i data-feather="menu" class="w-6 h-6 text-gray-600"></i>
            </button>
            <h1 class="text-xl font-semibold text-gray-800">Configurações</h1>
          </div>
          <button
            id="btnGuardar"
            class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
          >
            <i data-feather="save" class="w-4 h-4"></i> Guardar
          </button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 bg-gray-50">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Perfil -->
            <section
              class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6 section-card"
            >
              <h3 class="text-lg font-semibold text-gray-900 mb-4">Perfil</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Nome</label
                  >
                  <input
                    id="nome"
                    class="w-full px-3 py-2 border rounded-md"
                    placeholder="João Pereira"
                    value="João Pereira"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Email</label
                  >
                  <input
                    id="email"
                    type="email"
                    class="w-full px-3 py-2 border rounded-md"
                    placeholder="email@exemplo.pt"
                    value="joao.pereira@igfej.pt"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Função</label
                  >
                  <input
                    id="funcao"
                    class="w-full px-3 py-2 border rounded-md"
                    placeholder="Gestor"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Telefone</label
                  >
                  <input
                    id="telefone"
                    class="w-full px-3 py-2 border rounded-md"
                    placeholder="+351 912 345 678"
                  />
                </div>
              </div>
            </section>

            <!-- Preferências -->
            <section
              class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 section-card"
            >
              <h3 class="text-lg font-semibold text-gray-900 mb-4">
                Preferências
              </h3>
              <div class="space-y-4">
                <label class="flex items-center justify-between">
                  <span class="text-sm text-gray-700"
                    >Notificações por email</span
                  >
                  <input
                    id="notifEmail"
                    type="checkbox"
                    class="w-5 h-5"
                    checked
                  />
                </label>
                <label class="flex items-center justify-between">
                  <span class="text-sm text-gray-700">Notificações push</span>
                  <input id="notifPush" type="checkbox" class="w-5 h-5" />
                </label>
                <label class="flex items-center justify-between">
                  <span class="text-sm text-gray-700">Idioma: Português</span>
                  <select id="idioma" class="px-2 py-1 border rounded-md">
                    <option>Português</option>
                    <option>Inglês</option>
                  </select>
                </label>
                <label class="flex items-center justify-between">
                  <span class="text-sm text-gray-700">Tema</span>
                  <select id="tema" class="px-2 py-1 border rounded-md">
                    <option value="claro">Claro</option>
                    <option value="escuro">Escuro</option>
                  </select>
                </label>
              </div>
            </section>

            <!-- Segurança -->
            <section
              class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6 section-card"
            >
              <h3 class="text-lg font-semibold text-gray-900 mb-4">
                Segurança
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Palavra-passe</label
                  >
                  <input
                    id="pass"
                    type="password"
                    class="w-full px-3 py-2 border rounded-md"
                    placeholder="••••••••"
                  />
                </div>
                <div class="flex items-end">
                  <button
                    id="btnAlterarPass"
                    class="w-full px-4 py-2 bg-gray-800 text-white rounded-md hover:bg-black"
                  >
                    Alterar
                  </button>
                </div>
                <div class="md:col-span-3">
                  <label class="flex items-center gap-3">
                    <input id="mfa" type="checkbox" class="w-5 h-5" />
                    <span class="text-sm text-gray-700"
                      >Ativar autenticação de dois fatores (MFA)</span
                    >
                  </label>
                </div>
              </div>
            </section>

            <!-- Integrações -->
            <section
              class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 section-card"
            >
              <h3 class="text-lg font-semibold text-gray-900 mb-4">
                Integrações
              </h3>
              <div class="space-y-3">
                <div
                  class="flex items-center justify-between p-3 border rounded-md"
                >
                  <div class="flex items-center gap-3">
                    <i data-feather="mail" class="w-5 h-5 text-gray-600"></i>
                    <span class="text-sm text-gray-800">Email SMTP</span>
                  </div>
                  <button
                    class="px-3 py-1 text-sm border rounded-md hover:bg-gray-50"
                  >
                    Configurar
                  </button>
                </div>
                <div
                  class="flex items-center justify-between p-3 border rounded-md"
                >
                  <div class="flex items-center gap-3">
                    <i
                      data-feather="database"
                      class="w-5 h-5 text-gray-600"
                    ></i>
                    <span class="text-sm text-gray-800">Base de Dados</span>
                  </div>
                  <button
                    class="px-3 py-1 text-sm border rounded-md hover:bg-gray-50"
                  >
                    Configurar
                  </button>
                </div>
                <div
                  class="flex items-center justify-between p-3 border rounded-md"
                >
                  <div class="flex items-center gap-3">
                    <i data-feather="sliders" class="w-5 h-5 text-gray-600"></i>
                    <span class="text-sm text-gray-800">API Externa</span>
                  </div>
                  <button
                    class="px-3 py-1 text-sm border rounded-md hover:bg-gray-50"
                  >
                    Configurar
                  </button>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        AOS.init({ once: true });
        feather.replace();

        // Drawer
        const drawer = document.getElementById("mobileDrawer");
        document
          .getElementById("openDrawer")
          ?.addEventListener("click", () => drawer.classList.remove("hidden"));
        document
          .getElementById("closeDrawer")
          ?.addEventListener("click", () => drawer.classList.add("hidden"));
        document
          .getElementById("drawerBackdrop")
          ?.addEventListener("click", () => drawer.classList.add("hidden"));

        // Save
        document.getElementById("btnGuardar").addEventListener("click", () => {
          const prefs = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            funcao: document.getElementById("funcao").value,
            telefone: document.getElementById("telefone").value,
            notifEmail: document.getElementById("notifEmail").checked,
            notifPush: document.getElementById("notifPush").checked,
            idioma: document.getElementById("idioma").value,
            tema: document.getElementById("tema").value,
            mfa: document.getElementById("mfa").checked,
          };
          localStorage.setItem("igfej_prefs", JSON.stringify(prefs));
          alert("Configurações guardadas!");
        });

        const saved = localStorage.getItem("igfej_prefs");
        if (saved) {
          try {
            const p = JSON.parse(saved);
            ["nome", "email", "funcao", "telefone"].forEach((id) => {
              if (p[id]) document.getElementById(id).value = p[id];
            });
            document.getElementById("notifEmail").checked = !!p.notifEmail;
            document.getElementById("notifPush").checked = !!p.notifPush;
            if (p.idioma) document.getElementById("idioma").value = p.idioma;
            if (p.tema) document.getElementById("tema").value = p.tema;
            document.getElementById("mfa").checked = !!p.mfa;
          } catch (e) {}
        }

        document
          .getElementById("btnAlterarPass")
          .addEventListener("click", () => {
            alert(
              "Link para redefinição enviado para " +
                (document.getElementById("email").value || "o seu email.")
            );
          });
      });
    </script>
  </body>
</html>
