<html>
<head>
  <title>IGFEJ :: Visualizador de Procesos (BPMN) </title>

  <!-- required viewer styles -->
  <link rel="stylesheet" href="bpmn-js.css">

  <style>
    body {
      font-family: 'Arial', sans-serif;
    }

    .header input[type=text] {
      width: 500px;
      max-width: 100%;
    }

    .console textarea {
      width: 100%;
      min-height: 80px;
      border: none;
      padding: 0;
    }

    .canvas {
      border: solid 0px black;
    }
    
  </style>
</head>
<body>


  <div class="header">
   <!--  </p>  <h3>Open BPMN 2.0 diagram from URL</h3>
    <p>
      <input type="text" id="js-url" placeholder="path to diagram" /><button id="js-open">Open</button>
    </p>
    <p>
      <strong>Hint:</strong> try <code>igfej1.bpmn or pizza.bpmn</code></strong>
      
      -->
    
  </div>


  <div class="canvas">
    <div id="js-canvas"></div>
  </div>

  <div class="console">
     <!--   <h3>Console</h3> 
    <textarea id="js-console"></textarea> 
    -->
  </div>

  <!-- viewer -->
  <script src="bpmn-js.js"></script>

  <!-- jquery (required for example only) -->
  <script src="bpmn-jquery.js"></script>

  <!-- app -->

  <script>
  
//var  viewer = new BpmnViewer({ container: '#js-canvas',
//  width: '100%',
//  height: '100%',
//  modules: bpmnModules
//});

    var viewer = new BpmnJS({
      container: $('#js-canvas'),
        width: '100%',
        height: '100%'
    });

    function log(str) {
      var console = $('#js-console');
      console.val(console.val() + str + '\n');
    }

    function openFromUrl(url) {
      
      url = "/models/" + url;
      
      //log('Attempting to open <' + url + '>');

      $.ajax(url, { dataType : 'text' }).done(async function(xml) {

        try {

          await viewer.importXML(xml);

          viewer.get('canvas').zoom('fit-viewport');
          log('Attempting to open <' + url + '> .... Success');
          //log('Success');
        } catch (err) {

          log('Attempting to open <' + url + '> .... Failure');
          log('Error: ' + err.message);
          //console.error(err);
        }
      });
    }

    $('#js-open').click(function() {
      var url = $('#js-url').val();
      openFromUrl(url);
    });


    ///// auto open ?url=diagram-url ///////////////////////

    (function() {
      var str = window.location.search;
      var match = /(?:\&|\?)url=([^&]+)/.exec(str);

      if (match) {
        var url = decodeURIComponent(match[1]);
        $('#js-url').val(url);
        openFromUrl(url);
      }
    })();
  </script>
</html>
